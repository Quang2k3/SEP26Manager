name: Backend CD (Spring Boot)

on:
  push:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '17'
  DOCKER_IMAGE: sep26manager-backend

jobs:
  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:buildcache,mode=max

      - name: Image digest
        run: echo ${{ steps.meta.outputs.digest }}

  deploy:
    name: Deploy to Server
    runs-on: self-hosted
    needs: build-docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Pull latest Docker image
        run: docker pull quangnphe/sep26manager-backend:latest

      - name: Restart backend container
        working-directory: C:\Users\Public\Documents\ProjectSEP26\SEP26Manager
        run: |
          docker-compose pull backend
          docker-compose up -d --force-recreate --no-deps backend

      - name: Cleanup old images
        run: docker image prune -f

      - name: Verify deployment
        run: |
          Start-Sleep -Seconds 30
          try {
            $response = Invoke-WebRequest -Uri http://localhost:8080/actuator/health -UseBasicParsing
            if ($response.StatusCode -eq 200) {
              Write-Host "Backend deployed successfully!"
            }else {
              Write-Error "Health check returned status: $($response.StatusCode)"
              exit 1
            }
          } catch {
            Write-Error "Health check failed: $_"
            docker-compose logs backend
            exit 1
          }
